body:
  text: 福州鼓山湧泉禪寺傳法沙門元賢述金剛般若波羅蜜經金剛寶名其體最堅一切物不能壞其用最利能壞一切物故佛以之喻般若之德般若梵語此云智慧其體即實相雖流轉六趣而不損猶金剛之堅也其用即觀炤能炤破一切而不留猶金剛之利也約其功能稱波羅蜜波羅蜜亦梵語此云彼岸到意以生死為此岸煩惱為中流涅槃為彼岸全由般若為之舟楫乃能離生死岸渡煩惱流而登涅槃岸也經者鏡心之文載道之器其義訓法訓常亦訓徑法者十界同遵之正軌也常者萬古不易之常道也徑者出凡入聖之要路也若今經即般若為修行者之正軌常道要路是名為經也此經大旨宗乎無相而以不住為方便復以夢幻泡影露電六觀為方便中之方便初破我相次破法相後破非法相此三既破即是實相而實相無相究竟無所得而已證此無所得之法是謂如如是謂無為是謂涅槃是謂菩提亦但有其名而已向下備陳此旨觀者詳之如是我聞一時佛在舍衛國祗樹給孤獨園與大比丘眾千二百五十人俱此古謂之證信序乃明法有所受也如是者指法體也不變不異曰如離過絕非曰是我聞者阿難自述所聞也阿難已達我空實不計我但隨俗假稱故名為我我既無我聞亦無聞從緣生故不壞假名即不聞聞也一時者以諸方年月不同難以標定故但云一時乃取師資合會聽說究竟為一時耳佛具云佛陀此翻覺者覺有三義謂自覺覺他覺滿也舍衛國屬中天竺境祗樹給孤獨園乃佛所居精舍在舍衛城外東南五里間緣為給孤獨長者買園祗陀太子施樹故以為名大比丘等乃佛常隨之眾也大者臘高德著之稱比丘梵語此翻乞士謂上於諸佛乞法下於眾生乞食也千二百五十人者憍陳如三迦葉舍利弗目犍連耶舍長者并諸眷屬也此並先事外道艱苦累劫一無所證纔得見佛便登聖果感佛深恩故常隨侍其餘天龍八部四眾等皆結歸流通分中首尾相望蓋影略耳爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐此敘說法之由也將說般若而以乞食為由者欲顯般若大法不出尋常日用之間也佛稱世尊者十號俱彰為世中尊也食時乃辰巳之間以早食已辦施受俱便也著衣持鉢者七佛以來乞食之常儀乞食者佛以乞食為正命食餘食為邪命食故制比丘必乞食以自活今佛亦自乞者凡有三意一使懈怠者生慚二使貢高者除慢三使見聞者獲益也次第乞者佛行平等慈不擇貧富也敷座而坐者乞食事畢將說大法也秦譯止言坐他譯俱言入定示散心說法不能如實必從定發方稱理也又論云他經敷座乃是侍者惟說般若佛自敷座以尊重般若為諸佛母故時長老須菩提在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心長老者僧中之首須菩提梵語此云空生又名善現佛十大弟子中解空第一西域記云空生乃東方青龍陀佛示跡釋迦會中發揚空理者也偏袒右肩等乃西竺卑敬之義希有者曠劫難逢大千惟一福慧超絕三皆希有也如來者體本自如無來而來也護念者言佛善將大法護念諸菩薩使速至成佛無少留難也付囑者言佛善將大法付囑諸菩薩使轉度有情毋令斷絕也菩薩具云菩提薩埵此翻覺有情諸佛覺而無情眾生有情弗覺惟茲能覺而猶有情故稱菩提薩埵阿耨多羅三藐三菩提此云無上正等正覺即諸佛正徧二智也云何應住者問未發心時心住塵境今既發心應當依何境界而住云何降伏者問心或不住又當依何法而降伏之此應住降伏之法即所謂善護念善付囑者也佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞重言善哉者讚其所說之是亦讚其所問之要能廣益大眾及將來也諦聽者誡其不可以生滅心聽實相法也如是者懸指般若而言謂但應如是之法而住如是之法而降伏其心若不如是則所住即是妄境降伏轉成妄心又安能得無上菩提哉唯然者順從之辭此雖已領其指而未得聞其詳故復請之佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切眾生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之此詳答所問也問雖有二佛乃總答意以惟在降伏其心勿令著相更不可別求應住之法故先標降伏其心後結應如所教住也所有下言其發心廣大而深遠正所謂菩提心也胎卵濕化者三界受生差別也天與地獄惟屬化生鬼兼胎化人畜具四有色者色界天也無色者無色界天也有想者識處天也無想者無所有處天也非有想非無想者非想非非想處天也涅槃此云滅度謂滅五住煩惱度二種生死名無餘者乃成佛究竟更無餘依也既曰皆令入無餘涅槃又曰滅度之者何乃華梵雙舉也夫一切眾生根性不同何得皆入涅槃蓋為凡是有心定當作佛發廣大心者豈合有遺但善根成熟者即為度脫未成熟者且令成熟若八難之輩亦曲為其成種至後時度之也如是滅度無量無數無邊眾生實無眾生得滅度者何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩此言菩薩發心度生雖極其廣大深遠然實無一眾生得滅度者以菩薩不滯於相故也若有四相即有能度所度直生死之凡夫耳豈菩薩之謂乎此節佛答問意以無相為所應住以有相為當降伏也四相據論認五蘊為我我所名我相計我生人異於諸趣名人相計我由五蘊等法共聚而生名眾生相計我受一期報命不斷名壽者相此總一我相分之為四也然愚謂今經說無四相不止是說人無我如云實無眾生得滅度則非獨無眾生亦無涅槃也又如下文云若取法相即著我人眾生壽者若取非法相即著我人眾生壽者是知般若妙光直徹三空豈止人空而已哉復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住于相上言不可有相非是滅相令無但是不住而已不住正示降伏之法今約行以明之於法者總標六塵布施有三資生施無畏施法施也三施可攝六度六度廣攝萬行故今舉布施一度以該之又準大般若經始自五蘊終至菩提俱不何住今但言六塵亦是舉一以該之耳何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩不住相布施福德亦復如是不可思量須菩提菩薩但應如所教住徵云何以故要不住相布施耶以不住相布施則施契性空性空無邊故福亦無邊下舉十方虗空正喻福德之無邊也凡有二意一喻廣大無盡二喻究竟不窮但應如所教住者非單結應住實并結降伏其心佛意以住相即是妄心不住相即是降伏妄心既降超然無住即是所應住也佛答二問已竟又恐人隨語生疑故下詳為斷之須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來上言不可住相佛又恐人疑既不住相何成佛乃有相耶故舉以問空生空生答言不可以身相得見如來以如來身相乃淨分依他所成依他無性故身即非身也空生既悟佛身無相而復佛示之曰凡所有相皆是虗妄故雖佛身亦是虗妄然不可執相虗妄別求無相之佛但於相上達其非相即見如來以諸相既亡惟是覺體如鏡中現影達影全虗惟見是鏡也此乃是今經密意學者宜善觀之須菩提白佛言世尊頗有眾生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根上言非相見如來是義甚深故空生疑實信者之鮮其人實信謂直下炤破染淨有無諸法冥契實相也佛言汝莫謂今日無實信之人即最後五百歲亦有持戒修福之人於此法中能生實信何者以此人善根深厚已於無量千萬佛所種諸善根故也五百歲者佛滅後初五百歲解脫堅固第二五百歲禪定堅固第三五百歲多聞堅固第四五百歲塔寺堅固第五五百歲鬬諍堅固經言後五百歲指第五也聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸眾生得如是無量福德淨信者無所染著之信亦即實信也若有人宿福深厚能生一念淨信其信雖甚微而如來以佛智佛眼能悉知見其福德無量況永信者乎必言如來知見者以非如來莫能知見其福德之大也何以故是諸眾生無復我相人相眾生相壽者相無法相亦無非法相何以故是諸眾生若心取相即著我人眾生壽者若取法相即著我人眾生壽者何以故若取非法相即著我人眾生壽者徵云何以故一念淨信即獲如是無量福德以其心契般若妄執盡消無復于五蘊等法執有我人等相亦無五蘊等法相亦無無五蘊等非法相法相者自陰界入以至菩提涅槃有名有相者皆是也非法相者如說陰界入以至菩提涅槃皆不可得者是也復徵云四相固不可有法非法相何亦須無以若心取相即為著我人眾生壽者也若心取相二句總言法非法相不可取下乃別明之謂雖不認五蘊等法為我人眾生壽者但取有五蘊等法即是著我人眾生壽者夫法皆有相固可著至於非法則無相可著何亦須無以非因相立相去非存猶是著相故亦須無也此段舊多作三空釋之愚意不然以四相前已深明此但明法非法之不可取也故下文緊接云是故不應取法不應取非法其旨益明矣是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法承上文謂法與非法俱不應取以是義故所以如來嘗說我所說之法直如筏焉筏者過河則用到岸則捨不可常戀如來說法並是方便建立度諸有情非有真實豈可執而不捨哉法尚應捨何況非法者謂說空秪為度有有河既度空亦須空有尚須空況空可不空乎須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言世尊如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切聖賢皆以無為法而有差別上言無法無非法佛又恐人疑佛嘗得菩提亦嘗說法豈非有法可取可說也故舉以問空生空生深達佛意故便答言無有定法名阿耨多羅三藐三菩提亦無有定法可說無定法者無一定實法也何以無一定實法以如來所說之法皆不可以名相取正聞時不聞也皆不可以言語說正說時無說也既不可取不可說又豈有法與非法之可言哉又徵云此法何以不可取說以是無為之法故無為法者妙體淵寂本無名相不涉語言離一切分別有為之法乃一切聖賢之所同證但于中有淺深大小之別耳此經初恐人執相故破相次恐人執空故破空有空俱空始契實相是謂無為之法而般若之義無餘蘊矣須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多上言般若妙慧直徹三空頓證無為則其福德寧有窮盡故世尊舉寶施之福以顯彼勝三千大千者千世界為小千千小千為中千千中千為大千同一成壞是福德即非福德性者是福德無性乃勝義空也是故如來說福德多者是於非福德而說福德多乃世俗有也若執為實有豈如來之意哉若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法大千寶施之福雖多其實不足以言多若復有人於此經中受持乃至四句偈等為他人說其福勝彼徵云何以故持說一偈能勝於彼以寶施雖多福終有漏而此持經之功乃能淨除諸執圓滿極果是一切佛及一切佛所說之法皆從此經出也佛又恐人向佛法上住著故隨拂其跡云所謂佛法者即非佛法約俗諦中有迷悟染淨凡聖故說佛法從經而出約真諦中離於迷悟染淨凡聖安得有佛法從經出也信力曰受念力曰持四句偈者從來議論紛然各于經中取四句以當之不知上有乃至二字乃是自多至少之意謂于此經受持演說或全卷或半卷或一分乃至或四句偈等等字總指上受持之者又有以等字該後百千句者非是以經意原是自多至少非自少至多也須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹上言法不可取不可說佛恐人疑聲聞各取自果如證而說豈非有取有說耶乃舉以問空生而空生皆答言不也又各為明其取本無取說本無說之意聲聞初果斷八十一使分別粗惑名須陀洹華云入流謂初入聖流也非別實有所入只由不入六塵不被六塵之所牽引便名入流耳須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含聲聞二果斷欲界六品思惑名斯陀含華云一來謂從此命終一往天上一來人間便得阿那含故名一來實無往來者已悟我空誰為往來雖不廢往來但不計往來者耳須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含聲聞三果斷欲界九品思惑名阿那含華云不來謂從此命終往生天上不來下界受生故名不來而實無不來者既已無我誰為不來須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人眾生壽者聲聞四果斷上二界七十二品思惑盡名阿羅漢阿羅漢有三義一無賊以見思煩惱盡故二不生以斷分段生死不受後有故三應供以堪受人天大供養故實無有法者實無所得也若有一念得果之心即著我人等相又豈能得證乎此四果中惟阿羅漢獨名得道以餘三果未能全得其道故也世尊佛說我得無諍三昧人中最為第一是離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行前佛問四果空生俱云不得此復引己以證之佛說得無諍三昧者以其解空則彼我俱忘能不惱眾生亦能令眾生不起煩惱故也又云人中最為第一者以人中四相未除故皆有諍今既無諍是人中最為第一也離欲者三界貪心俱名為欲今已盡滅方成阿羅漢也我不作是念下釋佛讚之意以其無我也阿蘭那此云寂靜言我得阿羅漢道則四相未忘煩惱紛起豈成寂靜之行實無所行者謂我相既空則雖有所行而實無所行是為寂靜之行也佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得前明四果俱無所得佛又恐人疑佛于然燈受法豈非有取有說故舉以問空生空生言法實無所得者以然燈所說釋迦所聞是以無分別智契無分別理智與理冥境與神會豈有取說之朕哉須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴佛又恐人疑菩薩莊嚴佛土豈非有取耶故舉以問空生佛土者成佛時所得報土也莊嚴者謂佛土中種種莊嚴皆由菩薩萬行所致也空生答意謂菩薩具六度萬行莊嚴佛土而心無所著行而無行能嚴所嚴俱不可得即莊嚴而非莊嚴是名之為莊嚴佛土耳是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心承上文言非嚴而嚴者應生清淨心也所謂生清淨心者不應住六塵之境生心宜生無所住之心也生無所住之心則行而無行是之謂嚴而非嚴也須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身佛又恐人疑如來受得報身豈非有取故舉以問空生空生亦答言甚大又自釋曰若約真諦則報身是空本非身也又名之為大身者乃依俗諦說耳須菩提如恒河中所有沙數如是沙等恒河於意云何是諸恒河沙寧為多不須菩提言甚多世尊但諸恒河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恒河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德此較量顯勝也恒河者周四十里金沙混流其細如麵佛精舍近此故以為喻初謂一恒河之沙一沙計一恒河尚多無數況有如是諸恒河之沙寧有計量又以諸恒河之沙一沙計一大千世界悉將七寶充滿其中以用布施則世界無盡七寶無盡其功德之多為何如然持經功德實勝於彼以寶施雖多而四相未忘但得人天福報持經功德乃能人法雙空直成無上菩提非寶施者所可同日而語也此中較量比前尤勝前但言一三千界寶施此乃說無量三千界寶施以此文說四果無心釋迦無得嚴淨國土不嚴而嚴修證佛身無證而證非前文之所及故較量復勝於前也復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子此明經功之勝也塔者梵語窣堵波此云高顯謂摩雲矗漢俾遠近見者生福也廟者貌也謂堂中安佛形貌也意云持說四句偈之處尚有一切天人等供養如佛塔廟何況有人盡能受持讀誦全經者乎有人則非止是處也受持全經則非止是一偈也當知是人成就最上第一希有之法最上者直趣無上菩提也第一者逈超諸乘也希有者世間無比也受持此經者其得福如是即無人受持但是經典所在之處亦為有佛及弟子以經詮法身依法則有報化既有三身之佛必有賢聖弟子是經典在處三寶恒存其為人天等供養又何疑乎爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜空生聞受持此經功德之大故請得其名而受持之金剛有堅利之義般若之體用如之波羅蜜則是以般若之力度諸苦厄也所以立此名者何須知立名所以表實不可執名而喪實即此名非此名以名字性空了無可得此即其實義也又曰是此名者則借名以顯之耳當如是而奉持之是之謂善奉持者也須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說佛既立此經名恐人疑佛果有法可說故舉以問空生空生答言如來無所說者以真如絕待至理無言凡有所說性本空寂是有說而實無所說也下文歷舉說微塵說世界說三十二相皆明無所說之旨須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界法相之中多莫多於微塵大莫大於世界而微塵無實性世界亦無實性故說微塵非微塵世界非世界但以其由妄緣所成故名微塵世界耳夫微塵世界尚皆非有則佛之所說豈有實哉須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相佛恐人疑前說微塵世界乃是無情故可云無實性若佛身有情何可言無故舉以問空生空生答言不可以三十二相見如來以三十二相乃是依他所成亦無自性故曰即是非相但以非相之相名為三十二相耳夫佛身尚非有則佛之所說豈有實哉須菩提若善男子善女人以恒河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多此以身命較量倍顯經勝也佛恐人聞寶施不及持說以是身外之財若終身命布施必勝持說故復有斯較量謂捨命雖勝於寶施而持說復勝於捨命以捨命亦是有為之因止得有漏之果詎能與般若較其萬一哉爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經空生至此疑惑已除理解已廓乃自述其所悟也涕淚悲泣者自傷值遇之晚慧眼者聲聞所證能照真理者也未了中道實相故曰昔所未聞世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來說名實相此明經能生實相正今始得聞者也信心清淨者無諸染著也實相者真空之體實相而曰生者以二執既空則中道顯發權名曰生乃第一希有功德也空生復恐人聞實相之名遽生實相之想良以實相無相惟證相應纔起分別即乖實相故曰是實相非實相但依俗諦立假名耳世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有眾生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無眾生相無壽者相所以者何我相即是非相人相眾生相壽者相即是非相何以故離一切相即名諸佛空生自己領悟復慮後五百歲信解受持者難得其人何以難得其人以其深達空理無我人等相也所以無我人等相者何非四相元有而不執乃四相本非相也何以故四相本非相以諸佛覺體本離諸相也佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜從前希有世尊至即名諸佛皆空生自述之辭故佛印之曰如是如是若復有人下亦是牒空生之語而印其果為希有也驚謂愕然驚怪怖謂進退慞惶畏謂一向恐懼意謂此經之理最極微妙非器莫盛苟能一肩擔荷驀直向前其人甚為希有何以如是希有以諸波羅蜜中是第一波羅蜜故也波羅蜜有六前五若無般若即是有為不能到彼岸若有般若即成妙行方能到彼岸故般若為第一言第一即非第一者以般若空寂豈有第一可名但依世俗立此名耳須菩提忍辱波羅蜜如來說非忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無眾生相無壽者相何以故我於往昔節節支解時若有我相人相眾生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無眾生相無壽者相此明忍度必須般若以見般若之為第一也安耐為忍加毀為辱勝義諦中元無我人誰加誰忍故云非忍辱復引歌利之事以釋之歌利此云極惡佛昔作仙山中修道王同妃出獵疲倦而寢妃共禮仙王起問仙得四果不皆云不得王怒割截身體天怒雨石王懼懺悔仙曰我本無嗔王曰何知無嗔仙誓曰我若無嗔身即平復發誓已身果平復良由無四相故非忍而忍也復引過去五百世者以明既證無相則非特暫時可忍五百生皆如是也是知未得般若則有辱可忍終滯苦果若得般若則無辱可忍直到彼岸謂般若為第一波羅蜜不亦宜乎是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛說菩薩心不應住色布施須菩提菩薩為利益一切眾生應如是布施如來說一切諸相即是非相又說一切眾生即非眾生承上文言忍辱必須無相故勸離相發心所以離相者不應住六塵境上生心應生無所住之心何者若心有住則非所應住是故佛前說菩薩不應住色布施以菩薩為利益眾生而行布施若不離相見有眾生則滯于有為生滅非菩薩行故應離也然此非謂相實有而離之以相本自空相即非相也相既非相則一切眾生即非眾生何有相之可離哉須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗上文勸離相發心眾遂疑諸相固虗菩提必有實體今但離相則是無體無體豈能成菩提乎故眾疑而不能信佛乃以五語諭之勸其信也真語者言其理真而不妄也實語者言其事實而非虗也如語者言其事理俱如顯實相也不誑語者言佛以上三語說法決無欺誑也不異語者言其前後所說無有變異也五語如此可不信哉彼不信者以其不解如來意而執虗執實故也豈知如來所得之法不可以妄見分別此法本無實無虗乎所得法指菩提也性本空寂非實也體本自如非虗也今欲執菩提為實而疑其無體安知如來之法哉須菩提若菩薩心住於法而行布施如人入闇即無所見若菩薩心不住法而行布施如人有目日光明炤見種種色前言如來之法無實無虗然欲證此法必以離相為方便目喻人心入暗喻為相所惑入明喻不為相所惑空喻實相種種色喻性德也須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德此下讚經功德凡有五重今總標也須菩提若有善男子善女人初日分以恒河沙等身布施中日分復以恒河沙等身布施後日分亦以恒河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說須菩提以要言之是經有不可思議不可稱量無邊功德初明捨命不如勝謂一日三時以河沙身命布施且又經無量劫其福可謂勝矣然不及一念信心所謂信心者與般若相契當下即知空寂也一念信心已勝于彼何況復能書寫受持讀誦為人解說者乎其功德之廣大更不可筭數譬喻但可言不可思議不可稱量無邊功德而已如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見眾生見壽者見則於此經不能聽受讀誦為人解說二明專為大機勝大乘者始教終教是也最上乘者圓頓教是也能受持讀誦解說此經之人必是大乘最上乘機即為荷擔如來大法之人何以知然以樂小法者急于自度貪住涅槃即著我人等四見與此經無相之旨背矣安能聽受讀誦解說乎按前經四果無得已皆言得無我至此乃云樂小法者著我人等見何也蓋羅漢但得人無我未得法無我此經說無四相而曰非法非非法豈二乘之所共哉須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍遶以諸華香而散其處三明所在如塔勝言雖無人受持而經典所在即同佛塔以般若所在即同法身也復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提四明轉罪成佛勝若人持經而受人輕賤者乃是先世罪業合墮三途以持經之故遂以現遭輕賤之事易將惡來道之苦然非特罪業消滅且能得成菩提蓋以持經能生實相即是菩提真種又無我等相即煩惱障盡罪消滅即業障盡不墮即報障盡故云當得菩提也須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及五明超事多佛勝那由他者十億為一洛叉十洛叉為一俱胝十俱胝為一那由他供佛雖多其所得功德不及持經少分者以供佛止得福德持經乃得菩提故不可及也須菩提善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議前歷五重極明其功德之勝今更無可說但總結云經義不可思議果報亦不可思議而已說經至此意義已盡便合結經流通但為後來之眾未得盡聞或雖聞而未能深明其旨故空生復為重請乃有後分經文也爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心此問據圭峰疏以為住修降伏是我疑於義亦通但空生問辭與前不異且詳佛答意亦與前不異今強於不異中求異穿鑿甚矣近代諸師多謂前問人空後問法空愚謂此經前明法空已不啻三令五申空生豈容再問耶惟天台疏以為是重問重說大般若經中已有此例故今依之學者不必強解佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生得滅度者何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩此佛答問意與前不殊亦是總答二問以無相為所應住以有相為當降伏也所以者何須菩提實無有法發阿耨多羅三藐三菩提心者徵云菩薩所以無四相者何以體本空寂實無菩提之法又安有發菩提心之人哉即此觀之亦知此經無四相非特是人空實兼法空也須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛於此又恐人疑菩提既無有法何云佛於然燈佛處得菩提耶故舉以問空生空生答無者以心境雙空能所俱寂法本無法故得亦無得但心與理冥強名為得耳佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼如是如是者如來為空生印定無有法之言也後又反覆釋之謂若有法可得是有相心不順菩提然燈佛則不與我授記實無有法可得是無相心順菩提故記我當得作佛號釋迦牟尼耳何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法徵云既無菩提可得又何以名如來耶釋云所謂如來者即諸法如義如義者謂諸法性空全是真如自古自今本來現成別無聖凡染淨生滅去來之相又安有得不得耶若有人下出其錯解須菩提下示以正見謂菩提實無有法可得須知菩提離諸分別無實之可指亦無虗之可言一如而已是故如來說一切法皆是佛法以諸法皆如故然又名一切法者何以即非一切法是故名之為一切法也須菩提譬如人身長大須菩提言世尊如來說人身長大即非大身是名大身佛說一切法皆是佛法恐空生未領其旨故舉人身長大以驗之空生已解佛意乃曰非身名身定知皆佛法也須菩提菩薩亦如是若作是言我當滅度無量眾生則不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無眾生無壽者承上文須菩提言非大身名大身佛言菩薩亦如是若說我當度眾生是有菩薩便非菩薩以實無法可名菩薩也是故下引前言以證之一切法皆無四相者以一切法皆如故須菩提若菩薩作是念我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴若說我當行萬行以莊嚴佛土即是有菩薩非菩薩也必非莊嚴而莊嚴是莊嚴耳須菩提若菩薩通達無我法者如來說名真是菩薩前兩言有菩薩非菩薩此正明非菩薩是名菩薩以其通達無我法也無我有二一人無我二法無我我法本無但須通達不達則情生於寂然平等之中即有我度我嚴苟達則順性於粹然功德之表了然非嚴非度所以萬行沸騰而纖塵不立一真凝寂而眾德煥如乃名真菩薩也須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼上言無菩薩者以其通達無我法佛恐人疑眾生不能通達無我法何以亦云無眾生乎故為廣約五眼所見以明眾生非眾生也肉眼者凡夫肉眼止見障內佛肉眼見人中無數世界天眼者依肉眼處引出天眼凡夫天眼惟見障外二乘天眼惟見三千界佛天眼能見諸天細色及無數河沙世界慧眼者以根本智炤真空理二乘惟炤生空菩薩能炤法空但是分證惟佛圓炤三空靡有不盡法眼者以後得智說法度人二乘無法眼菩薩所知未盡地地不同惟佛則所知障盡無法不知無生不度佛眼即前四眼以在佛皆勝故名佛眼也須菩提於意云何如恒河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心此明五眼所見迤邐共有五節初約一恒河以數沙次約河沙以數河三約無量河沙以數界四約爾所界中所有生五約所有生中種種心此皆佛五眼所洞見悉知其心皆非心是名為心也心既非心則眾生本寂又安有眾生哉所以者何須菩提過去心不可得現在心不可得未來心不可得此徵釋非心之義所言非心者謂過現未三俱不可得蓋過去已滅未來未生現在不住又秪是虗妄分別將指何者以為心耶須菩提於意云何若人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多前言三心叵得佛恐人疑謂心既叵得則作福依心而起亦皆非有遂廢修福故舉寶施以問空生而空生已知佛意故答以多福世尊復明其意謂不達性空執以為實則心有所住故福成有漏不可言多若達性空不執為實則心無所住故福成無漏乃可言多是知不可廢福而不修但貴修不住相也須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足上言福德無說福德多恐人疑佛身相好皆佛福佛之所成就則相好亦可見如來故佛舉以問空生具足色身八十種好也具足諸相三十二相也此相好雖是佛福德之所成就乃法身中現出影子非是實體故皆云不應非色身非諸相者色相元空也是名色身是名諸相者色相不無也須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法上云色身相好俱不可見佛又恐人疑謂色相既非佛如何能說法故謂空生曰汝勿謂如來有所說法也若言有說即為謗佛何者以如來達諸法空畢竟無執無能說之佛亦無所說之法若言有說豈非是謗然又何以名說佛耶以無法可說是名說法也爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是經生信心不佛言須菩提彼非眾生非不眾生何以故須菩提眾生眾生者如來說非眾生是名眾生此六十二言原出魏本秦本所無今考二論皆有釋文故亦添入此疑如來說法是無所說無說之法眾生豈能信乎佛言汝將謂眾生實是眾生故不能信不知此眾生者不實是眾生亦非不是眾生何以非眾生而又非不眾生耶以眾生之所以為眾生者總繇妄緣所成非實是眾生是名眾生耳夫眾生既全非實豈可謂其永不能信而與般若相背哉須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提前已言無法得菩提今疑世尊成佛名得菩提何亦云無得耶故舉以問佛佛言無有少法可得是名菩提者以妄執盡處即是覺滿也此與前實無有法如來得阿耨多羅三藐三菩提不同以前就因中說此就果中說又前止言無法此則言無法名菩提也復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無眾生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法此承上文言無有少法可得者以是法平等在凡不減在聖不增無有高下故無得與不得但證此平等之法是名為無上菩提也然雖曰平等非可不修而得應以無我等心修諸善法則了緣並運正助雙融其於菩提庶可希冀耳佛又恐人執善法為實滯于有為故曰即非善法是名善法此中前言無得後又言有得如何會通蓋言有得者證此無可得也須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一千萬億分乃至算數譬喻所不能及上言以無我無人等修諸善法當得菩提而善法之中當以持經為最故復以寶施較持經功德以持經則非獨得善法之福亦兼得無我之慧也須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念何以故實無有眾生如來度者若有眾生如來度者如來則有我人眾生壽者須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫上言是法平等無有高下或疑若皆平等云何如來常度眾生故佛為斷之汝等勿謂下遮錯解何以故下示正見如來說有我下展轉發明無我以佛無我故不見有眾生可度佛雖有時說我元來無我執我者蓋是凡夫雖言凡夫亦無凡夫凡夫尚不可得如來安得有我如來無我又安有所度之眾生哉若然則雖終日度生不妨一道平等也須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來前已言色身不可見如來佛又恐人疑色身從法身中現出則色身固非如來亦可因是而觀如來故舉問空生而空生果以為然故佛以轉輪聖王難之蓋以本測末則可以末測本則不可也空生既悟其非佛又說偈以明之以真如法身非見聞所及乃真智之境惟證相應故色相不可觀而觀亦不可用矣觀者詳視也須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提佛既說不可以聲色觀如來恐人不達其旨便一向離相求佛故此遮之蓋色相雖非佛佛亦不離色相也須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相此言離相求佛是說諸法斷滅夫求菩提者萬行門中不捨一法豈說斷滅法哉若說斷滅法則于因中虧六度萬行於果中損福德莊嚴其于菩提相去遠矣須菩提若菩薩以滿恒河沙等世界七寶以用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得福德何以故須菩提以諸菩薩不受福德故佛又恐人聞不說斷滅遂著於有為貪彼福德故謂寶施之福雖多不名為勝獨於一切法上知是無我成於忍者獨為最勝何以為最勝耶以受福德故福德劣不受福德故福德勝也忍即得二無我之智須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德此釋不受之義謂秪是於福德上不生貪著之心是故說不受耳作福而生貪著則因成有漏果必有漏作福而不生貪著則因成無漏果亦無漏故菩薩不應貪著不貪著者以其無我故須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來上言菩薩以無我之故獲福勝于寶施人遂謂菩薩成佛實有出現受福之事故佛先出其錯解謂如來有去來坐臥也後示正見謂如來無去來坐臥也蓋法身不動猶若虗空化身如影隨機應現若有出現而實無出現若有受福而實無受福也須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多不甚多世尊何以故若是微塵眾實有者佛則不說是微塵眾所以者何佛說微塵眾則非微塵眾是名微塵眾世尊如來所說三千大千世界即非世界是名世界何以故若世界實有者則是一合相如來說一合相則非一合相是名一合相須菩提一合相者即是不可說但凡夫之人貪著其事上言不應貪著者非是相有而不著乃相本自空也故約塵界相破以顯法無自性微塵若是實有佛則不說是微塵何以不說是微塵耶以微塵之名秪是假立微塵本無自性乃是因界碎而成則實非微塵名為微塵耳非特微塵也世界亦然世界無自性非是實有但假名世界耳何以故非世界名世界耶若謂世界是實有則不過是眾微塵合一之相既是眾塵所合則非別有一合之相但有其名而已空生於此已破其相佛復為徹底指出曰所謂一合相者即是不可說以相既非相即是實相不可以言語名字強為之詮表者也以凡夫不達執相為實而妄生貪著耳須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見眾生見壽者見則非我見人見眾生見壽者見是名我見人見眾生見壽者見上言凡夫之人貪著其事者皆由於我法起妄執也今除我執謂若人言如來說我人等見者是人不解佛所說義何者以我人等見本自空寂當體如如故云非我人等見但隨俗假稱是名我人等見也須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相此除法執謂於一切法知其不生法相見其不生法相信解其不生法相何以如是知見信解以法相非相其體本寂無相可得但名為法相也須菩提若有人以滿無量阿僧祗世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀二執既盡自然冥契真如可以演說此經故佛告空生謂無量阿僧祗世界七寶布施不及受持讀誦為人演說此經之福云何為人演說便能勝耶以不取於相如如不動故耳不取相者不取我相不取法相亦不取非法相三相叵得始能如彼真如而永無變動也何以故能不取相耶但應觀一切有為之法如夢幻泡影露電而已此六者全無實體而妄現似有全無實體可破我法二相妄現似有可破非法相能作此觀而般若之義盡是矣佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅等聞佛所說皆大歡喜信受奉行此結經也般若深經三世佛母聞經四句已超惡趣之因一念淨持必獲菩提之記故人天異類舉皆歡喜信受奉行信受者不信諸法惟信般若也奉行者依經起行不取于相行而無行也
