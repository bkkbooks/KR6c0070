front:
  text: 金剛略疏序眾生汩沒於生死海中頭出頭沒無有出期其故何哉良以心鏡本淨像色元虗而眾生認以為實繇是起欣厭生去取造妄業而自甘招幻輪而忍苦譬如夢中見虎人與虎而俱非眼裏生華眼並華而交病執之不捨寧有已時我佛憫之為說破有之法名大般若般若凡有八部而金剛其一也金剛凡有六譯而秦譯其一也文約而義豐辭顯而理奧實為八部之精要其指歸于破人法之妄執了一心之實相令諸眾生不取於相如如不動而已余弱冠時即知讀此經求其義於諸疏心殊厭之以理本直也而釋之以紆回辭本顯也而索之於隱昧蓋多絆於二論之葛藤而不能自脫者也及有弗宗二論者則又妄逞胸臆越宗趣而違佛旨識者呵之故疏金剛者不下數十家求其善疏莫之或聞辛巳之秋余自婺反建寓居寶善時心石師作金剛凟蒙一宗圭峰長水而刪繁就要以便初機命余訂之余雖從事其間亦不過依他作解因人成事而已於己心終未能安故金剛一疏反成不了之業迨乙酉春改制後倦於說禪終日坦腹而臥無以消閑乃取是經日疏之盡誅舊日葛藤獨揭斬新日月但理求其當辭求其達無紆回隱昧之獘而已三易稿而疏成客有難余者曰古疏上祖慈尊下宗二論無片言隻字不有所本今子棄之而弗從豈子之智能超於諸大聖哉余曰是不然子謂天親能背無著不曰不也子謂無著能背內院不曰不也子既謂三聖相承如水傳器則宜確守師說如天台後學一字不敢移易可也今觀天親立二十七疑已非無著之意無著分一十八住亦非內院之言則何其分道而馳若此哉子若知無著天親之必不背內院則知余今日之必不背無著天親也客謝而退因并錄之以弁簡首石鼓主人釋元賢題
